<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Users | Admin</title>
  <link rel="stylesheet" href="../main/admin.css" />
  <link rel="stylesheet" href="../trending/trending.css">
  <link rel="stylesheet" href="users.css">
  <!-- Font Awesome for icons -->
  <script
  src="https://kit.fontawesome.com/d62bd036de.js"
  crossorigin="anonymous"
></script>
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  integrity="sha512-Bx85rE+MT5+IsAwIE9X0Z7FOzMZHzBkgq4U+SBe7pCyRYv/d0VHJ/fZzC4VvW2Wv0G/7P1aeZzLRqap8QeY6Rg=="
  crossorigin="anonymous"
  referrerpolicy="no-referrer"
/></head>
<body data-page="users">
  <div class="container">
    <div id="sidebar"></div>

    <main class="main-content">
      <h1>User Management</h1>
      <div class="table-container">
        <table class="trending-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Full Name</th>
              <th>Email</th>
              <th>Password</th>
              <th>Edit</th>
              <th>Delete</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>Jay Chavan</td>
              <td>jay@gmail.com</td>
              <td><input type="password" value="jay12345" readonly class="password-field" /></td>
              <td><button class="edit-btn" onclick="openModal()">Edit</button></td>
              <td><button class="delete-btn">Delete</button></td>
            </tr>


          </tbody>
        </table>
      </div>
    </main>
    
  </div>
  <!-- User Edit Modal -->
<div id="editModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Edit User</h3>
      <span class="close-btn" onclick="closeModal()">&times;</span>
    </div>
    <form id="editForm">
      <label>Full Name</label>
      <input type="text" name="fullname" placeholder="Enter full name" required />

      <label>Email</label>
      <input type="email" name="email" placeholder="Enter email" required />

      <label>Password</label>
      <input type="password" name="password" placeholder="Enter new password" required />

      <div class="modal-footer">
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-save">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="users.js"></script>

  <script src="../loadSidebar.js"></script>
</body>
</html>
