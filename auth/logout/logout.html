<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Sphere - Logout</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" type="text/css" href="logout.css">
</head>

<body>
    <div class="left-illustration">
        <!-- Illustration content if needed -->
    </div>

    <div class="logout-container">
        <div class="logout-header">
            <h4>Event Sphere</h4>
            <h1>Log Out</h1>
        </div>

        <div class="alert alert-success" id="success-alert">You have been successfully logged out.</div>

        <div class="logout-message">
            <p>Are you sure you want to log out of your account?</p>
        </div>

        <div class="button-group">
            <button type="button" class="btn btn-secondary" id="cancel-btn">
                Cancel
            </button>
            <button type="button" class="btn btn-primary" id="logout-btn">
                Log Out
                <span class="loading-spinner" id="logout-spinner"></span>
            </button>
        </div>

        <div class="login-footer">
            <div class="signup-link">
                <a href="/frontend/login/login.html">Return to Login</a>
            </div>
        </div>
    </div>

    <div class="right-illustration">
        <!-- Illustration content if needed -->
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="logout.js"></script>
</body>

</html>
